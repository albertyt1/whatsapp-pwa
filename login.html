<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="/whatsapp-pwa/css/style.css">

<style>
body {
    font-family: Arial;
    background: #111b21;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 400px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #25d366;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1ebe5d;
}
</style>

</head>

<body>

<div class="container">
    <h2>Iniciar sesión</h2>

    <select id="country"></select>

    <input type="text" id="phone" placeholder="Número de teléfono">

    <button onclick="login()">Continuar</button>
</div>

<script src="/whatsapp-pwa/js/login.js"></script>

</body>
</html>
