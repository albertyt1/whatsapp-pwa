<!DOCTYPE html>
<html>
<head>
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Welcome</title>
  <link rel="stylesheet" href="/whatsapp-pwa/css/style.css">
</head>

<body>

  <button onclick="window.location.href='/whatsapp-pwa/status.html'">
Ver Estados
</button>

<div class="container">

  <img src="/whatsapp-pwa/assets/illustration.png" class="illustration">

  <h1>Welcome to WhatsApp</h1>

  <p>
    Read our <span class="green">Privacy Policies</span>. Tap 
    "Agree and continue" to accept our 
    <span class="green">Terms of Service</span>.
  </p>

  <button onclick="goNext()" class="btn primary">
    Agree and continue
  </button>

</div>

<script>
function goNext(){
  window.location.href = "login.html";
}
</script>

<h3 id="user"></h3>

<script>
const user = localStorage.getItem("userPhone");
document.getElementById("user").innerText = user;
</script>

<script>
if (!localStorage.getItem("userPhone")) {
    window.location.href = "/whatsapp-pwa/login.html";
}
</script>
</body>
</html>
