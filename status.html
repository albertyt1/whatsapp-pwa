<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estados</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b141a;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    background: #202c33;
}

.status-list {
    display: flex;
    overflow-x: auto;
    padding: 10px;
}

.status {
    margin-right: 10px;
    text-align: center;
    cursor: pointer;
}

.circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #25d366;
    display: flex;
    align-items: center;
    justify-content: center;
}

.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}
</style>

</head>
<body>

<div class="header">Estados</div>

<div class="status-list" id="statusList"></div>

<div class="viewer" id="viewer" onclick="closeViewer()"></div>

<script src="/whatsapp-pwa/js/status.js"></script>

</body>
</html>
